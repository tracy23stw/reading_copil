<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Reading Copilot — 阅读伙伴</title>
  <meta name="description" content="EPUB 阅读伙伴，边读边查人物档案">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app" id="app">
    
    <!-- ===== 顶栏 ===== -->
    <header class="topbar">
      <span class="topbar__logo">Reading Copilot</span>
      
      <div class="topbar__actions">
        <!-- 导航 -->
        <nav class="topbar__nav">
          <a href="#" class="nav-link active" data-view="reader">阅读</a>
          <a href="#" class="nav-link" data-view="characters">人物总览</a>
          <a href="#" class="nav-link" data-view="graph">关系图谱</a>
        </nav>
        
        <!-- 小文件夹图标 — 选择文件 -->
        <label class="btn-file" title="选择 EPUB 文件">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <input type="file" id="file-input" accept=".epub">
        </label>
      </div>
    </header>

    <!-- ===== 书名 ===== -->
    <div id="book-title" class="book-title" style="display:none;"></div>

    <!-- ===== 空状态 — 选择文件 ===== -->
    <div class="empty-state" id="empty-state">
      <div class="empty-state__folder">
        <div class="folder-icon">
          <div class="folder-icon__tab"></div>
          <div class="folder-icon__body"></div>
        </div>
      </div>
      <p class="empty-state__text">打开一本书开始阅读</p>
      <label class="btn-primary">
        选择 EPUB 文件
        <input type="file" id="file-input-upload" accept=".epub">
      </label>
      <p class="empty-state__hint">支持 .epub 格式</p>
    </div>

    <!-- ===== 加载状态 ===== -->
    <div class="loading" id="loading-state" style="display:none;">
      <div class="loading__dots">
        <div class="loading__dot"></div>
        <div class="loading__dot"></div>
        <div class="loading__dot"></div>
      </div>
      <p class="loading__text">正在解析书籍...</p>
    </div>

    <!-- ===== 主内容区 ===== -->
    <div class="main" id="reader-pane" style="display:none;">
      
      <!-- 阅读区 -->
      <div class="reader-pane">
        <div class="reader-container">
          <div id="epub-viewer"></div>
        </div>
      </div>

      <!-- 人物档案面板 (右侧滑出) -->
      <aside class="character-panel" id="character-panel">
        <div class="character-panel__header">
          <h2 class="character-panel__name" id="panel-name"></h2>
          <button class="character-panel__close" id="panel-close" aria-label="关闭">×</button>
        </div>
        <div class="character-panel__body">
          <!-- 统计 -->
          <div class="character-panel__stats" id="panel-stats"></div>
          
          <!-- 标签 -->
          <div class="character-panel__tags" id="panel-tags"></div>
          
          <!-- 摘要 -->
          <div class="character-panel__section-title">简介</div>
          <p class="character-panel__summary" id="panel-summary"></p>
          
          <!-- 关联人物 -->
          <div class="character-panel__section-title">关联人物</div>
          <ul class="related-list" id="panel-related"></ul>
        </div>
      </aside>
    </div>

    <!-- ===== 翻页控制 ===== -->
    <div class="pagination" id="pagination" style="display:none;">
      <button class="pagination__btn" id="btn-prev" aria-label="上一页">‹</button>
      <div class="pagination__info-container">
        <span class="chapter-info" id="chapter-info"></span>
        <input type="number" id="progress-input" class="progress-input" min="0" max="100" value="0">
        <span class="progress-percent">%</span>
      </div>
      <button class="pagination__btn" id="btn-next" aria-label="下一页">›</button>
    </div>

    <!-- ===== 人物总览区 (Characters) ===== -->
    <div class="view-section" id="view-characters" style="display:none; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto;">
      <div class="characters-grid" id="characters-grid" style="display:none;"></div>
      <div class="empty-state" id="empty-state-characters" style="display:flex;">
        <p class="empty-state__text">大模型分析完成后即可查看人物档案</p>
      </div>

      <!-- 人物详情模态框 -->
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
          <h2 class="modal__title" id="modal-name"></h2>
          <div class="modal__section">
            <div class="modal__section-title">基本信息</div>
            <div id="modal-stats" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"></div>
            <div id="modal-tags" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
          </div>
          <div class="modal__section">
            <div class="modal__section-title">简介</div>
            <p id="modal-summary" style="line-height:1.75;color:var(--color-text-primary);"></p>
          </div>
          <div class="modal__section">
            <div class="modal__section-title">关联人物</div>
            <ul class="related-list" id="modal-related"></ul>
          </div>
          <div class="modal__section">
            <div class="modal__section-title">出场章节</div>
            <div id="modal-chapters" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== 关系图谱区 (Graph) ===== -->
    <div class="view-section graph-container" id="view-graph" style="display:none; width: 100vw; height: calc(100vh - var(--topbar-height)); position: relative;">
      <div class="empty-state" id="empty-state-graph" style="display:flex; height: 100%; align-items: center; justify-content: center;">
        <p class="empty-state__text" style="color:var(--color-text-muted);">大模型分析完成后即可查看关系图谱</p>
      </div>
      <div id="graph-container" style="width: 100%; height: 100%;"></div>
      <div id="tooltip" class="graph-tooltip" style="position: absolute; background: var(--color-bg-paper); border: 1px solid var(--color-line); padding: 16px; box-shadow: 4px 4px 0px rgba(143, 144, 150, 0.2); max-width: 280px; display: none; pointer-events: none; z-index: 10;"></div>
    </div>

  </div>

  <!-- ===== 依赖 ===== -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
  
  <!-- ===== 应用代码 ===== -->
  <script src="js/config.js"></script>
  <script src="js/llm-client.js"></script>
  <script src="js/analyzer.js"></script>
  <script src="js/epub-reader.js"></script>
  <script src="js/graph-render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
