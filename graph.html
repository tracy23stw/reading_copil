<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>人物关系图谱 — Reading Copilot</title>
  
  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- 样式 -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- D3.js -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      overflow: hidden; /* 防止图谱页面滚动 */
    }
    
    .graph-container {
      width: 100vw;
      height: calc(100vh - var(--topbar-height));
      position: relative;
    }
    
    /* 图谱样式定制 */
    .node-circle {
      fill: var(--color-bg-paper);
      stroke: var(--color-accent);
      stroke-width: 2px;
      cursor: pointer;
      transition: fill 0.2s;
    }
    .node-circle:hover {
      fill: var(--color-bg-folder);
    }
    
    .node-label {
      font-family: var(--font-primary);
      font-size: 14px;
      fill: var(--color-text-main);
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: central;
    }
    
    .link-line {
      stroke: var(--color-line-paper);
      stroke-opacity: 0.6;
    }
    
    .link-label {
      font-family: var(--font-mono);
      font-size: 10px;
      fill: var(--color-text-muted);
      pointer-events: none;
      text-anchor: middle;
    }

    /* 详情浮层 */
    .graph-tooltip {
      position: absolute;
      background: var(--color-bg-paper);
      border: 1px solid var(--color-line);
      padding: 16px;
      box-shadow: 4px 4px 0px rgba(143, 144, 150, 0.2);
      max-width: 280px;
      display: none;
      pointer-events: none;
      z-index: 10;
    }
    .graph-tooltip h3 {
      font-family: var(--font-primary);
      margin: 0 0 8px 0;
      color: var(--color-accent);
    }
    .graph-tooltip p {
      font-size: 13px;
      line-height: 1.6;
      margin: 0;
      color: var(--color-text-main);
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <header class="topbar">
    <div class="topbar__left">
      <a href="index.html" class="topbar__brand" style="text-decoration:none; color:inherit;">Reading Copilot</a>
    </div>
    <div class="topbar__center">
      <div id="book-title" class="topbar__title" style="display:block;">人物关系图谱</div>
    </div>
    <div class="topbar__right">
      <nav class="topbar__nav">
        <a href="index.html" class="nav-link">阅读</a>
        <a href="characters.html" class="nav-link">人物总览</a>
        <a href="graph.html" class="nav-link active">关系图谱</a>
      </nav>
    </div>
  </header>

  <!-- 图谱容器 -->
  <main class="graph-container" id="graph-container">
    <div id="tooltip" class="graph-tooltip"></div>
  </main>

  <script src="js/graph-render.js"></script>
</body>
</html>
